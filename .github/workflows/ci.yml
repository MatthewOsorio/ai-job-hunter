name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Validate formatting
        run: mvn formatter:validate --batch-mode --no-transfer-progress

      - name: Build and package
        run: mvn package -DskipTests --batch-mode --no-transfer-progress

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: ai-job-hunter-jar
          path: target/ai-job-hunter-1.0-SNAPSHOT.jar
          retention-days: 7

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Compile
        run: mvn compile --batch-mode --no-transfer-progress

      - name: SpotBugs analysis
        run: mvn spotbugs:check --batch-mode --no-transfer-progress

      - name: Run tests with coverage
        run: mvn test jacoco:report --batch-mode --no-transfer-progress

